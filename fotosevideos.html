  <script>
    let currentImageIndex = 0;
    const images = [
      'imagens/museu/16911325.jpg',
'imagens/museu/novas/1 (21).jpg',
'imagens/museu/casa-museu-amalia-rodrigues-1.jpeg',
'imagens/museu/casa-museu-amalia-rodrigues-14.jpeg',

'imagens/museu/novas/1 (17).jpg',
'imagens/museu/novas/1 (18).jpg',
'imagens/museu/novas/1 (19).jpg',
'imagens/museu/novas/1 (20).jpg',

    ];

    function openModal(index) {
      currentImageIndex = index;
      document.getElementById("modalImage").src = images[currentImageIndex];
      document.getElementById("myModal").style.display = "block";
    }

    function closeModal() {
      document.getElementById("myModal").style.display = "none";
    }

    function changeImage(direction) {
      currentImageIndex += direction;
      if (currentImageIndex < 0) currentImageIndex = images.length - 1;
      if (currentImageIndex >= images.length) currentImageIndex = 0;
      document.getElementById("modalImage").src = images[currentImageIndex];
    }
  </script>
